name: 每日全自动获取节点并发布博客

on:
  schedule:
    # 对应 UTC 时间每天 01:17，即北京时间每天早上 09:17 错峰触发
    - cron: '17 1 * * *'
  workflow_dispatch: # 保留手动触发按钮，方便随时后台一键运行

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取当前仓库代码
        uses: actions/checkout@v3

      - name: 2. 配置 Python 运行环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装 MkDocs 博客及依赖
        run: |
          pip install mkdocs-material
          pip install pymdown-extensions

      - name: 4. 执行自动生成脚本 (抓节点 + 匹配密码 + 写新文章)
        run: python scripts/auto_build.py

      - name: 5. 将生成的文章提交存档回 GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add docs/nodes/posts/*.md
          git commit -m "🤖 自动更新今日免费节点文章 [$(date +'%Y-%m-%d')]" || echo "今日毫无变动，无需提交"
          git push

      - name: 6. 编译并推送上线到 GitHub Pages
        run: mkdocs gh-deploy --force