site_name: Chris的博客
site_url: https://lanyun122.github.io/blog/

theme:
  name: material
  language: zh
  custom_dir: overrides 
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
  
  # 1. 主题颜色开关
  palette:
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-sunny  # 👈 建议用这个图标，语义更清晰
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night  # 👈 建议用这个图标
        name: 切换到浅色模式

# 额外样式        
extra_css:
  - stylesheets/extra.css

# 2. 插件设置
plugins:
  - search:
      lang: zh
  - tags

  # 👈 引擎1（保持原样）：管理你原本的“专栏博客”
  - blog:
      pagination_per_page: 5

  # 👈 引擎2（新增）：专门去渲染管理“节点订阅”文件夹，生成独立的时间线列表页
  - blog:
      blog_dir: nodes
      pagination_per_page: 10

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

# 3. 导航栏结构
nav:
  - 首页: index.md
  - 专栏博客: 
      - blog/index.md
  - 推荐及工具:
      - 推荐: 
          - recommend/index.md
      - 详细文档: 
          - tools/index.md
          - 常用工具: tools/2026-03-26-tools.md
          - Openclaw安装、使用文档: tools/2026-03-26-Openclaw-tools.md
          - Banwagong(搬瓦工VPS): tools/2026-04-25-VPS-banwagong.md
